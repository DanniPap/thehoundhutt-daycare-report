const { useState, useMemo, useEffect } = React;

// ── Google Sheets storage ─────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6fDeku6udgbZDcc_T3gWEZs5PCtGs5l1NJ5p6xSt7vHEufHuRM1BZjpKUSq6UeU-e/exec';

const _storage = {
  _cache: null,

  async _fetchAll() {
    if (this._cache) return this._cache;
    try {
      const res = await fetch(SCRIPT_URL + '?action=list');
      const data = await res.json();
      this._cache = Array.isArray(data) ? data : [];
    } catch(e) {
      this._cache = [];
    }
    return this._cache;
  },

  async list(prefix) {
    const reports = await this._fetchAll();
    const keys = reports.map(r => r._storageKey).filter(k => k && k.startsWith(prefix));
    return { keys };
  },

  async get(key) {
    const reports = await this._fetchAll();
    const report = reports.find(r => r._storageKey === key);
    return report ? { value: JSON.stringify(report) } : null;
  },

  async set(key, value) {
    this._cache = null;
    const report = JSON.parse(value);
    const payload = encodeURIComponent(JSON.stringify({ key, report }));
    const url = SCRIPT_URL + '?action=save&data=' + payload;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Sheet save failed: ' + res.status);
    return { key, value };
  }
};


// Safe date parser — handles strings, Date objects, and Google Sheets date formats
function safeDate(d) {
  if (!d) return null;
  if (typeof d === 'string') {
    // already "YYYY-MM-DD"
    const dt = new Date(d + 'T00:00:00');
    return isNaN(dt) ? new Date(d) : dt;
  }
  if (d instanceof Date) return d;
  // Google Sheets may return a serial number
  if (typeof d === 'number') {
    const dt = new Date((d - 25569) * 86400 * 1000);
    return dt;
  }
  return new Date(String(d));
}

function safeDateStr(d) {
  const dt = safeDate(d);
  if (!dt || isNaN(dt)) return 'Unknown Date';
  return dt.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function safeDateStrLong(d) {
  const dt = safeDate(d);
  if (!dt || isNaN(dt)) return 'Unknown Date';
  return dt.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

const WHEEL_CATS = [

];

const SCORE_LABELS = { 2:"2", 3:"Bad", 4:"Poor", 5:"Okay", 6:"Good", 7:"Great", 8:"Excellent", 9:"Outstanding", 10:"Perfection" };
const MOODS = ["😄","😊","😐","😕","😤"];
const MOOD_LABELS = ["Great","Good","Okay","Down","Stressed"];
const BUSYNESS_LABELS = { 1:"Very Quiet", 2:"Quiet", 3:"Slow", 4:"Gentle", 5:"Normal", 6:"Busy", 7:"Very Busy", 8:"Hectic", 9:"Almost Chaotic", 10:"Chaotic Madness" };
const EMPTY_OPS = { daycareDogs:"", daycareStaff:"", groomingDogs:"", groomers:"", walkIns:"", newClientPacks:"" };
const OPS_FIELDS = [
  ["daycareDogs","Daycare Dogs","🐕"],
  ["daycareStaff","Daycare Team on Site","👤"],
  ["groomingDogs","Grooming Dogs","✂️"],
  ["groomers","Groomers on Site","💈"],
  ["walkIns","Walk-ins","🚶"],
  ["newClientPacks","New Client Packs","📦"],
];

function buildCSV(reports) {
  const sorted = [...reports].sort((a,b) => a.date.localeCompare(b.date));
  const headers = ["Date","Total Hours","Team Names","Team Moods","Team Hours","Level Of Busy Score","Level Of Busy Label",...WHEEL_CATS.map(c=>c.label),...OPS_FIELDS.map(([,label])=>label),"Notes"];
  const esc = v => `"${String(v ?? "").replace(/"/g,'""')}"`;
  const rows = sorted.map(r => [
    r.date, r.totalHours,
    r.staff.map(s=>s.name).join(", "),
    r.staff.map(s=>s.mood).join(", "),
    r.staff.map(s=>s.hours).join(", "),
    r.busyness.score, r.busyness.label,
    ...WHEEL_CATS.map(c=>r.wheel[c.key]??""),
    ...OPS_FIELDS.map(([key])=>r.operations[key]??0),
    r.notes??""
  ].map(esc));
  return [headers.map(esc), ...rows].map(r=>r.join(",")).join("\n");
}

function downloadCSV(reports) {
  const blob = new Blob([buildCSV(reports)], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hound-hutt-weather-reports.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Radar Chart ──────────────────────────────────────────────────
function RadarChart({ scores }) {
  const cx=130, cy=130, maxR=90, n=WHEEL_CATS.length;
  const angle = i => (i/n)*2*Math.PI - Math.PI/2;
  const sR = s => Math.max(0,((s-2)/8)*maxR);
  const gPts = lv => WHEEL_CATS.map((_,i)=>{ const a=angle(i),r=sR(lv); return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`; }).join(" ");
  const dPts = WHEEL_CATS.map((cat,i)=>{ const a=angle(i),r=sR(scores[cat.key]||5); return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; });
  const avg = (Object.values(scores).reduce((a,b)=>a+b,0)/Object.values(scores).length).toFixed(1);
  return (
    <svg viewBox="0 0 260 260" style={{width:"100%",maxWidth:280,display:"block",margin:"0 auto"}}>
      {[2,4,6,8,10].map(l=><polygon key={l} points={gPts(l)} fill="none" stroke={l===10?"rgba(137,222,206,0.35)":"rgba(137,222,206,0.12)"} strokeWidth={l===10?1.5:1}/>)}
      {WHEEL_CATS.map((_,i)=>{const a=angle(i);return <line key={i} x1={cx} y1={cy} x2={cx+maxR*Math.cos(a)} y2={cy+maxR*Math.sin(a)} stroke="rgba(137,222,206,0.15)" strokeWidth="1"/>;})}
      <polygon points={dPts.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(137,222,206,0.18)" stroke="#89DECE" strokeWidth="2.5" strokeLinejoin="round"/>
      {dPts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="#89DECE"/>)}
      {WHEEL_CATS.map((cat,i)=>{const a=angle(i),lr=maxR+17;return <text key={i} x={cx+lr*Math.cos(a)} y={cy+lr*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize="14">{cat.emoji}</text>;})}
      <circle cx={cx} cy={cy} r={18} fill="#0d3d4f"/>
      <text x={cx} y={cy-3} textAnchor="middle" dominantBaseline="middle" fontSize="13" fontWeight="900" fill="white">{avg}</text>
      <text x={cx} y={cy+10} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill="rgba(255,255,255,0.75)">AVG</text>
    </svg>
  );
}

// ── Score Picker ──────────────────────────────────────────────────
function ScorePicker({ value, onChange }) {
  const col = s => s<=3?{border:"#fca5a5",active:"#ef4444"}:s<=5?{border:"#fcd34d",active:"#f59e0b"}:s<=7?{border:"#86efac",active:"#22c55e"}:{border:"#89DECE",active:"#89DECE"};
  return (
    <div style={{display:"flex",gap:4,justifyContent:"space-between"}}>
      {[2,3,4,5,6,7,8,9,10].map(s=>{
        const c=col(s),on=s===value;
        return <button key={s} onClick={()=>onChange(s)} style={{flex:1,height:40,borderRadius:8,border:"2px solid",borderColor:on?c.active:c.border,backgroundColor:on?c.active:"white",color:on?"white":"#475569",fontSize:13,fontWeight:800,cursor:"pointer",transition:"all 0.12s",fontFamily:"inherit",padding:0}}>{s}</button>;
      })}
    </div>
  );
}

  const dateStr = new Date(r.date+"T00:00:00").toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  // Radar SVG
  const cx=160,cy=160,maxR=120,n=10;

  const sR = s=>Math.max(0,((s-2)/8)*maxR);
  const gPts = lv=>CATS.map((_,i)=>{const a=angle(i),r2=sR(lv);return `${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`;}).join(" ");
  const dPts = CATS.map((cat,i)=>{const a=angle(i),r2=sR(r.wheel[cat.key]||5);return {x:cx+r2*Math.cos(a),y:cy+r2*Math.sin(a)};});
  const spokeLines = CATS.map((_,i)=>{const a=angle(i);return `<line x1="${cx}" y1="${cy}" x2="${cx+maxR*Math.cos(a)}" y2="${cy+maxR*Math.sin(a)}" stroke="rgba(137,222,206,0.2)" stroke-width="1"/>`;}).join("");
  const gridPolys = [2,4,6,8,10].map(l=>`<polygon points="${gPts(l)}" fill="none" stroke="${l===10?"rgba(137,222,206,0.4)":"rgba(137,222,206,0.15)"}" stroke-width="${l===10?1.5:1}"/>`).join("");
  const dataPath = `<polygon points="${dPts.map(p=>`${p.x},${p.y}`).join(" ")}" fill="rgba(137,222,206,0.2)" stroke="#89DECE" stroke-width="2.5" stroke-linejoin="round"/>`;

  const radarSVG = `<svg viewBox="0 0 320 320" width="280" height="280" xmlns="http://www.w3.org/2000/svg">${gridPolys}${spokeLines}${dataPath}${dots}${emojiLabels}${scoreLabels}<circle cx="${cx}" cy="${cy}" r="24" fill="#C4E9F4"/><text x="${cx}" y="${cy-4}" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="900" fill="white">${wAvg}</text><text x="${cx}" y="${cy+11}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="rgba(255,255,255,0.8)">AVG</text></svg>`;

  const scoreColor = s=>s<=3?"#ef4444":s<=5?"#f59e0b":s<=7?"#22c55e":"#89DECE";
  const scoreBg = s=>s<=3?"#fef2f2":s<=5?"#fffbeb":s<=7?"#f0fdf4":"#FFF2CC";

  const wheelRows = CATS.map(cat=>`
    <tr>
      <td style="padding:7px 10px;font-weight:700;font-size:13px;">${cat.emoji} ${cat.label}</td>
      <td style="padding:7px 10px;text-align:center;">

  const staffRows = r.staff.map(s=>`

  const opsItems = [

    ["Grooming Dogs","✂️",r.operations.groomingDogs],
    ["Groomers","💈",r.operations.groomers],
    ["Walk-ins","🚶",r.operations.walkIns],
    ["New Client Packs","📦",r.operations.newClientPacks],

  return `<!DOCTYPE html>
<html lang="en">

<body>

      <div style={{padding:"10px 10px 16px"}}>

        {/* Header */}
        <div style={{background:C.teal,color:"#0d3d4f",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:900,fontSize:14,letterSpacing:"0.3px"}}>🐾 THE HOUND HUTT — TEAM WEATHER REPORT</div>
          </div>
          <div style={{fontWeight:900,fontSize:13,whiteSpace:"nowrap",marginLeft:8}}>{dateStr}</div>
        </div>

        {/* Stat pills */}
        {/* HOURS — hero stat */}
        <div style={{backgroundColor:"#fdf4ff",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:"#9333ea",marginBottom:4}}>{safeDateStrLong(r.date)}</div>
            <div style={{fontSize:10,fontWeight:900,color:"#9333ea",opacity:0.7,letterSpacing:"0.8px",textTransform:"uppercase"}}>⏱️ Total Team Hours</div>
            <div style={{fontWeight:900,fontSize:36,color:"#9333ea",lineHeight:1}}>{r.totalHours}h</div>
          </div>
          <div style={{textAlign:"right"}}>
            {(()=>{const moodEmoji={"Great":"😄","Good":"😊","Okay":"😐","Down":"😕","Stressed":"😤"};return r.staff.filter(s=>s.name).map((s,i)=>(
              <div key={i} style={{fontSize:12,fontWeight:700,color:"#9333ea"}}>{s.name} · {s.hours}h {moodEmoji[s.mood]||"😊"}</div>
            ));})()}
          </div>
        </div>
        {/* Wheel + Busy */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          {[
            {val:wAvg,lbl:"WHEEL AVG",bg:"#f0fdf4",col:"#16a34a"},
            {val:`${r.busyness.score} — ${r.busyness.label}`,lbl:"LEVEL OF BUSY",bg:"#e8f7fc",col:"#0d3d4f"},
          ].map((s,i)=>(
            <div key={i} style={{backgroundColor:s.bg,borderRadius:8,padding:"7px 8px",textAlign:"center"}}>
              <div style={{fontWeight:900,fontSize:i===1?12:20,color:s.col,lineHeight:1.1}}>{s.val}</div>
              <div style={{fontSize:9,fontWeight:700,color:s.col,opacity:0.65,marginTop:2}}>{s.lbl}</div>
            </div>
          ))}
        </div>

        {/* Main two-column body */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

          {/* LEFT column */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>

            {/* Operations — full height */}
            <div style={{backgroundColor:"#f8fafc",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:9,fontWeight:900,color:"#94a3b8",letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:8}}>🐶 Operations</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {OPS_FIELDS.map(([key,label,emoji])=>(
                  <div key={key} style={{backgroundColor:"white",borderRadius:8,padding:"9px 10px",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:900,fontSize:32,color:"#0d3d4f",lineHeight:1}}>{r.operations[key]??0}</div>
                      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginTop:3,lineHeight:1.3}}>{label.replace("Dogs in ","").replace(" on Site","")}</div>
                    </div>
                    <div style={{fontSize:28,lineHeight:1}}>{emoji}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* Notes — sits below ops in left column */}
            {r.notes&&(
              <div style={{backgroundColor:"#fffbeb",border:"2px solid #f59e0b",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:900,color:"#92400e",letterSpacing:"0.5px",marginBottom:5}}>📝 NOTES</div>
                <div style={{fontSize:14,fontWeight:700,fontStyle:"italic",color:"#78350f",lineHeight:1.6}}>"{r.notes}"</div>
              </div>
            )}
          </div>

          {/* RIGHT column */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>

            {/* Mini radar */}
            <div style={{backgroundColor:"#f8fafc",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:9,fontWeight:900,color:"#94a3b8",letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:4}}>🎡 Wheel</div>
              <svg viewBox="0 0 180 180" width="100%" style={{maxWidth:160,display:"block",margin:"0 auto"}}>
                {[2,5,8,10].map(l=><polygon key={l} points={gPts(l)} fill="none" stroke={l===10?"rgba(137,222,206,0.4)":"rgba(137,222,206,0.12)"} strokeWidth="1"/>)}
                {CATS.map((_,i)=>{const a=ang(i);return <line key={i} x1={cx} y1={cy} x2={cx+maxR*Math.cos(a)} y2={cy+maxR*Math.sin(a)} stroke="rgba(137,222,206,0.15)" strokeWidth="0.8"/>;} )}
                <polygon points={dPts.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(137,222,206,0.2)" stroke="#89DECE" strokeWidth="2" strokeLinejoin="round"/>
                {dPts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill="#89DECE"/>)}
                {CATS.map((cat,i)=>{const a=ang(i),lr=maxR+13;return <text key={i} x={cx+lr*Math.cos(a)} y={cy+lr*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize="10">{cat.emoji}</text>;})}
                <circle cx={cx} cy={cy} r="16" fill="#0d3d4f"/>
                <text x={cx} y={cy-2} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="900" fill="white">{wAvg}</text>
                <text x={cx} y={cy+9} textAnchor="middle" dominantBaseline="middle" fontSize="6" fill="rgba(255,255,255,0.75)">AVG</text>
              </svg>
            </div>

            {/* Wheel scores */}
            <div style={{backgroundColor:"#f8fafc",borderRadius:8,padding:"8px 10px",flex:1}}>
              <div style={{fontSize:9,fontWeight:900,color:"#94a3b8",letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:6}}>📊 Scores</div>
              {CATS.map(cat=>(
                <div key={cat.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:10,fontWeight:600,color:"#475569"}}>{cat.emoji} {cat.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                    <span style={{fontSize:9,color:C.muted}}>{SLABELS[r.wheel[cat.key]]}</span>
                    <span style={{fontWeight:900,fontSize:12,color:scoreColor(r.wheel[cat.key])}}>{r.wheel[cat.key]}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{textAlign:"center",marginTop:8,fontSize:9,color:"#94a3b8",fontWeight:600}}>
          The Hound Hutt · {new Date(r.submittedAt||Date.now()).toLocaleString("en-AU",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}
        </div>
      </div>
    </div>
  );
}

// ── History Screen ────────────────────────────────────────────────
function HistoryScreen({ reports, onBack, onEdit }) {
  const C = { teal:"#C4E9F4", pink:"#F4BD3F", muted:"#64748b", border:"#e2e8f0", text:"#0f172a" };
  const sorted = [...reports].sort((a,b)=>b.date.localeCompare(a.date));
  const [selected, setSelected] = useState(null);
  if (selected) return <ReportDetailScreen report={selected} onBack={()=>setSelected(null)}/>;
  return (
    <div style={{fontFamily:"'Nunito','Segoe UI',sans-serif",backgroundColor:"#FFF2CC",minHeight:"100vh",color:C.text}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap'); *{box-sizing:border-box}`}</style>
      <div style={{backgroundColor:C.teal,padding:"18px 16px",color:"#0d3d4f",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:10,padding:"8px 12px",color:"#0d3d4f",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>
          <div>
            <div style={{fontWeight:900,fontSize:17}}>📋 Report History</div>
            <div style={{fontSize:11,opacity:0.75,fontWeight:700}}>{reports.length} report{reports.length!==1?"s":""} saved</div>
          </div>
          <button onClick={()=>downloadCSV(reports)} style={{marginLeft:"auto",backgroundColor:C.pink,border:"none",borderRadius:10,padding:"10px 16px",color:"white",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>⬇ Export CSV</button>
        </div>
      </div>

      <div style={{padding:"14px 14px 40px"}}>
        {reports.length===0 ? (
          <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
            <div style={{fontSize:48,marginBottom:12}}>📭</div>
            <div style={{fontWeight:800,fontSize:17}}>No reports yet</div>
            <div style={{fontSize:14,marginTop:6}}>Submitted reports will appear here.</div>

        ) : sorted.map((r,i)=>{

              onClick={()=>setSelected(r)}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,0.12)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 8px rgba(0,0,0,0.06)"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:900,fontSize:17}}>
                    {safeDateStr(r.date)}
                  </div>
                  <div style={{fontSize:13,color:C.muted,marginTop:2}}>
                    {r.staff.map(s=>s.hours>0?`${s.name} (${s.hours}h)`:s.name).join(", ")||"No staff recorded"}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0,marginLeft:10}}>
                  <div style={{backgroundColor:"#f0fdf4",borderRadius:10,padding:"6px 10px",textAlign:"center"}}>
                    <div style={{fontWeight:900,fontSize:18,color:"#16a34a"}}>{wAvg}</div>
                    <div style={{fontSize:9,color:C.muted,fontWeight:700}}>WHEEL</div>
                  </div>
                  <div style={{backgroundColor:"#e8f7fc",borderRadius:10,padding:"6px 10px",textAlign:"center"}}>
                    <div style={{fontWeight:900,fontSize:18,color:"#0d3d4f"}}>{r.busyness.score}</div>
                    <div style={{fontSize:9,color:C.muted,fontWeight:700}}>BUSY</div>
                  </div>
                  <div style={{backgroundColor:"#fdf4ff",borderRadius:10,padding:"6px 10px",textAlign:"center"}}>
                    <div style={{fontWeight:900,fontSize:18,color:"#9333ea"}}>{r.totalHours}</div>
                    <div style={{fontSize:9,color:C.muted,fontWeight:700}}>HOURS</div>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {OPS_FIELDS.map(([key,label,emoji])=>(
                  <span key={key} style={{fontSize:12,backgroundColor:"#f8fafc",borderRadius:8,padding:"4px 8px",fontWeight:700,color:C.muted}}>
                    {emoji} {r.operations[key]??0}
                  </span>
                ))}
              </div>
              {r.notes&&<div style={{marginTop:10,fontSize:13,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>"{r.notes}"</div>}
              <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <button onClick={e=>{e.stopPropagation();onEdit(r);}} style={{backgroundColor:"#FFF2CC",border:`1.5px solid #89DECE`,borderRadius:8,padding:"7px 14px",color:"#C4E9F4",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✏️ Edit</button>
                <span style={{fontSize:12,fontWeight:800,color:C.pink,display:"flex",alignItems:"center",gap:4}}>📄 Tap to view report →</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const today = new Date().toISOString().split("T")[0];
  const [view, setView] = useState("form");
  const [step, setStep] = useState(1);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [reports, setReports] = useState([]);
  const [lastReport, setLastReport] = useState(null);
  const [editingKey, setEditingKey] = useState(null);
  const [loadingReports, setLoadingReports] = useState(true);

  const [date, setDate] = useState(today);
  const [staff, setStaff] = useState([{name:"",mood:1,hours:""}]);
  const [wheel, setWheel] = useState(Object.fromEntries(WHEEL_CATS.map(c=>[c.key,7])));
  const [busyness, setBusyness] = useState(5);
  const [ops, setOps] = useState(EMPTY_OPS);
  const [notes, setNotes] = useState("");
  const [validationError, setValidationError] = useState("");

  useEffect(()=>{
    (async()=>{
      try {
        const result = await _storage.list("hound-report:");
        if (result?.keys?.length) {
          const loaded = await Promise.all(result.keys.map(async key=>{
            try { const r=await _storage.get(key); return r?{...JSON.parse(r.value),_storageKey:key}:null; } catch{return null;}
          }));
          setReports(loaded.filter(Boolean));
        }
      } catch(e){console.error("Load error",e);}
      finally{setLoadingReports(false);}
    })();
  },[]);

  const totalHours = useMemo(()=>staff.reduce((s,m)=>s+(parseFloat(m.hours)||0),0),[staff]);
  const addStaff = ()=>{setStaff(p=>[...p,{name:"",mood:1,hours:""}]);setValidationError("");};
  const removeStaff = idx=>setStaff(p=>p.filter((_,i)=>i!==idx));
  const updateStaff = (idx,field,val)=>{setStaff(p=>p.map((s,i)=>i===idx?{...s,[field]:val}:s));setValidationError("");};

  const validate = (s) => {
    if (s === 1) {
      const named = staff.filter(m => m.name.trim());
      if (named.length === 0) return "Please add at least one team member.";
      for (const m of named) {
        if (m.hours === "" || m.hours === null) return `Please enter hours for ${m.name.trim()}.`;
      }
    }
    if (s === 3) {
      for (const [key, label] of OPS_FIELDS) {
        if (ops[key] === "") return `Please enter a number for "${label}" (use 0 if none).`;
      }
    }
    return "";
  };

  const handleNext = () => {
    const err = validate(step);
    if (err) { setValidationError(err); return; }
    setValidationError("");
    setStep(s => s + 1);
  };

  const handleSubmit = async()=>{
    const err = validate(3);
    if (err) { setValidationError(err); return; }
    setValidationError("");
    setSubmitting(true);
    const report = {
      date,
      staff: staff.filter(s=>s.name.trim()).map(s=>({name:s.name.trim(),mood:MOOD_LABELS[s.mood],hours:parseFloat(s.hours)||0})),
      totalHours,
      wheel: Object.fromEntries(WHEEL_CATS.map(c=>[c.key,wheel[c.key]])),
      busyness:{score:busyness,label:BUSYNESS_LABELS[busyness]},
      operations: Object.fromEntries(OPS_FIELDS.map(([key])=>[key,parseInt(ops[key])||0])),
      notes,
      submittedAt: new Date().toISOString(),
    };
    try {
      const key = editingKey || `hound-report:${date}-${Date.now()}`;
      const reportWithKey = {...report, _storageKey: key};
      await _storage.set(key, JSON.stringify(reportWithKey));
      setReports(prev => editingKey
        ? prev.map(r => r._storageKey === editingKey ? reportWithKey : r)
        : [...prev, reportWithKey]
      );
      setLastReport(reportWithKey);
      setEditingKey(null);
      setSubmitted(true);
    } catch(e){alert("Save failed: "+e.message);}
    finally{setSubmitting(false);}
  };

  const reset = ()=>{
    setSubmitted(false); setStep(1); setDate(today); setLastReport(null); setEditingKey(null);
    setStaff([{name:"",mood:1,hours:""}]);
    setWheel(Object.fromEntries(WHEEL_CATS.map(c=>[c.key,7])));
    setBusyness(5); setOps(EMPTY_OPS); setNotes("");
  };

  const startEdit = (r) => {
    setEditingKey(r._storageKey);
    setDate(r.date);
    setStaff(r.staff.map(s=>({name:s.name,mood:MOOD_LABELS.indexOf(s.mood),hours:String(s.hours)})));
    setWheel(r.wheel);
    setBusyness(r.busyness.score);
    setOps(Object.fromEntries(OPS_FIELDS.map(([key])=>[key,String(r.operations[key]??0)])));
    setNotes(r.notes||"");
    setStep(1);
    setSubmitted(false);
    setValidationError("");
    setView("form");
  };

  if (view==="history") return <HistoryScreen reports={reports} onBack={()=>setView("form")} onEdit={startEdit}/>;
  if (view==="detail" && lastReport) return <ReportDetailScreen report={lastReport} onBack={()=>{setView("form");setSubmitted(true);}}/>;

  const C={teal:"#C4E9F4",tealMid:"#89DECE",tealLight:"#C4E9F4",pink:"#F4BD3F",bg:"#e8f7fc",card:"#ffffff",text:"#0f172a",muted:"#64748b",border:"#e2e8f0"};
  const card={backgroundColor:C.card,borderRadius:16,padding:"18px 16px",boxShadow:"0 1px 8px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.03)",marginBottom:12};
  const inp={border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:16,fontFamily:"inherit",width:"100%",outline:"none",boxSizing:"border-box",backgroundColor:"white",color:C.text};
  const pct=step===1?33:step===2?66:100;

  if (submitted) return (
    <div style={{fontFamily:"'Nunito','Segoe UI',sans-serif",backgroundColor:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap'); *{box-sizing:border-box}`}</style>
      <div style={{textAlign:"center",maxWidth:380,width:"100%"}}>
        <div style={{fontSize:72,marginBottom:12}}>🐶</div>
        <h1 style={{color:C.teal,fontWeight:900,fontSize:26,margin:"0 0 8px"}}>Report Saved!</h1>
        <p style={{color:C.muted,fontSize:15,marginBottom:24}}>
          {safeDateStrLong(date)}'s report is saved. {reports.length} report{reports.length!==1?"s":""} in history.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {lastReport&&<button onClick={()=>setView("detail")} style={{backgroundColor:C.pink,color:"white",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>📲 Screenshot Format for Google Chat</button>}
          <button onClick={reset} style={{backgroundColor:C.teal,color:"white",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>Submit Another Report</button>
          <button onClick={()=>setView("history")} style={{backgroundColor:"white",color:"#0d3d4f",border:`2px solid ${C.teal}`,borderRadius:12,padding:14,fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>📋 View History & Export CSV</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Nunito','Segoe UI',sans-serif",backgroundColor:C.bg,minHeight:"100vh",color:C.text}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        *{box-sizing:border-box}
        input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:#e2e8f0;outline:none;cursor:pointer}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#89DECE;cursor:pointer;box-shadow:0 2px 8px rgba(137,222,206,0.5)}
        input[type=number]{-moz-appearance:textfield}
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
        button{touch-action:manipulation}
      `}</style>

      {/* HEADER */}
      <div style={{backgroundColor:C.teal,padding:"18px 16px 14px",color:"#0d3d4f",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{fontSize:26}}>🐶</div>
          <div>
            <div style={{fontWeight:900,fontSize:17,letterSpacing:"0.5px",color:"#0d3d4f"}}>THE HOUND HUTT</div>
            <div style={{fontSize:11,opacity:0.75,fontWeight:700,letterSpacing:"1px",color:"#0d3d4f"}}>{editingKey?"✏️ EDITING REPORT":"TEAM WEATHER REPORT"}</div>
          </div>
          <button onClick={()=>setView("history")} style={{marginLeft:"auto",backgroundColor:"rgba(0,61,79,0.1)",border:"none",borderRadius:10,padding:"7px 12px",color:"#0d3d4f",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            📋 {loadingReports?"...":reports.length}
          </button>
        </div>
        <div style={{backgroundColor:"rgba(255,255,255,0.2)",borderRadius:99,height:6,overflow:"hidden"}}>
          <div style={{backgroundColor:C.pink,height:"100%",width:`${pct}%`,borderRadius:99,transition:"width 0.4s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:7,fontSize:11,fontWeight:700}}>
          {["👥 TEAM","🎡 WHEEL","📊 OPS"].map((l,i)=><span key={i} style={{opacity:step>=i+1?1:0.45}}>{l}</span>)}
        </div>
      </div>

      <div style={{padding:"14px 14px 100px"}}>

        {/* STEP 1 */}
        {step===1&&(
          <div>
            <div style={card}>
              <label style={{fontWeight:800,fontSize:13,color:C.muted,display:"block",marginBottom:8,letterSpacing:"0.5px"}}>📅 DATE</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp}/>
            </div>
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontWeight:900,fontSize:17}}>👥 Team Today</div>
                <div style={{backgroundColor:C.tealLight,color:"#0d3d4f",borderRadius:20,padding:"5px 13px",fontWeight:800,fontSize:14}}>{totalHours}h total</div>
              </div>
              {staff.map((s,i)=>(
                <div key={i} style={{padding:"12px 0",borderBottom:i<staff.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input type="text" placeholder={`Team member ${i+1}`} value={s.name} onChange={e=>updateStaff(i,"name",e.target.value)} style={{...inp,flex:1,fontWeight:700}}/>
                    <input type="number" min="0" max="24" step="0.5" placeholder="hrs" value={s.hours} onChange={e=>updateStaff(i,"hours",e.target.value)} onWheel={e=>e.target.blur()} style={{...inp,width:80,textAlign:"center",padding:"10px 6px",fontSize:16,borderColor:s.name.trim()&&s.hours===""?"#fca5a5":C.border}}/>
                    {staff.length>1&&<button onClick={()=>removeStaff(i)} style={{width:36,height:36,flexShrink:0,borderRadius:10,border:"none",backgroundColor:"#fef2f2",color:"#ef4444",fontSize:16,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✕</button>}
                  </div>
                </div>
              ))}
              <button onClick={addStaff} style={{width:"100%",marginTop:12,padding:12,borderRadius:12,border:`2px dashed ${C.tealMid}`,backgroundColor:C.tealLight,color:"#0d3d4f",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>+ Add Person</button>
            </div>
          </div>
        )}

        {/* STEP 2 */}
        {step===2&&(
          <div>
            <div style={{...card,textAlign:"center"}}>
              <div style={{fontWeight:900,fontSize:17,marginBottom:14}}>🎡 Live Preview</div>
              <RadarChart scores={wheel}/>
              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
                {WHEEL_CATS.map(cat=>(
                  <span key={cat.key} style={{fontSize:11,backgroundColor:"#f1f5f9",borderRadius:6,padding:"3px 7px",color:C.muted,fontWeight:700}}>{cat.emoji} {wheel[cat.key]}</span>
                ))}
              </div>
            </div>
            {WHEEL_CATS.map(cat=>(
              <div key={cat.key} style={card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontWeight:900,fontSize:16}}>{cat.emoji} {cat.label}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>{cat.desc}</div>
                  </div>
                  <div style={{backgroundColor:"#0d3d4f",color:"white",borderRadius:12,padding:"6px 12px",minWidth:56,textAlign:"center",flexShrink:0,marginLeft:12}}>
                    <div style={{fontWeight:900,fontSize:20,lineHeight:1}}>{wheel[cat.key]}</div>
                    <div style={{fontSize:9,fontWeight:700,opacity:0.8,marginTop:2}}>{SCORE_LABELS[wheel[cat.key]]}</div>
                  </div>
                </div>
                <ScorePicker value={wheel[cat.key]} onChange={v=>setWheel(p=>({...p,[cat.key]:v}))}/>
              </div>
            ))}
          </div>
        )}

        {/* STEP 3 */}
        {step===3&&(
          <div>
            <div style={card}>
              <div style={{fontWeight:900,fontSize:17,marginBottom:4}}>📈 Level Of Busy</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,fontWeight:700,marginBottom:10}}>
                <span>Very Quiet &amp; Slow</span><span>Chaotic Madness</span>
              </div>
              <input type="range" min="1" max="10" value={busyness} onChange={e=>setBusyness(parseInt(e.target.value))} style={{width:"100%"}}/>
              <div style={{textAlign:"center",marginTop:10}}>
                <span style={{fontWeight:900,fontSize:28,color:"#0d3d4f"}}>{busyness}</span>
                <span style={{fontSize:16,fontWeight:700,color:C.muted,marginLeft:8}}>— {BUSYNESS_LABELS[busyness]}</span>
              </div>
            </div>
            <div style={card}>
              <div style={{fontWeight:900,fontSize:17,marginBottom:16}}>🐶 Numbers</div>
              {OPS_FIELDS.map(([key,label,emoji],idx)=>(
                <div key={key} style={{display:"flex",alignItems:"center",gap:12,paddingBottom:12,marginBottom:12,borderBottom:idx<OPS_FIELDS.length-1?`1px solid ${C.border}`:"none"}}>
                  <span style={{fontSize:22,flexShrink:0,width:30,textAlign:"center"}}>{emoji}</span>
                  <div style={{flex:1,fontWeight:700,fontSize:14}}>{label}</div>
                  <input type="number" min="0" value={ops[key]} onChange={e=>setOps(p=>({...p,[key]:e.target.value}))} style={{...inp,width:72,textAlign:"center",padding:"10px 6px"}}/>
                </div>
              ))}
            </div>
            <div style={card}>
              <label style={{fontWeight:900,fontSize:16,display:"block",marginBottom:10}}>📝 Notes</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Please write detailed notes about the day" rows={4} style={{...inp,resize:"vertical"}}/>
            </div>
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,backgroundColor:"white",borderTop:`1px solid ${C.border}`,padding:"10px 14px",boxShadow:"0 -4px 16px rgba(0,0,0,0.06)"}}>
        {validationError&&(
          <div style={{backgroundColor:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"9px 14px",marginBottom:8,fontSize:13,fontWeight:700,color:"#dc2626",display:"flex",alignItems:"center",gap:6}}>
            ⚠️ {validationError}
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
        {step>1&&<button onClick={()=>{setStep(s=>s-1);setValidationError("");}} style={{flex:1,padding:14,borderRadius:12,border:"2px solid #e2e8f0",backgroundColor:"white",color:"#0f172a",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>}
        {step<3
          ?<button onClick={handleNext} style={{flex:2,padding:14,borderRadius:12,border:"none",backgroundColor:"#0d3d4f",color:"white",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>Next →</button>
          :<button onClick={handleSubmit} disabled={submitting} style={{flex:2,padding:14,borderRadius:12,border:"none",backgroundColor:submitting?"#94a3b8":C.pink,color:"white",fontSize:15,fontWeight:800,cursor:submitting?"not-allowed":"pointer",fontFamily:"inherit",transition:"background-color 0.2s"}}>
            {submitting?"⏳ Saving...":(editingKey?"💾 Save Changes":"✅ Submit Report")}
          </button>
        }
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
